<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Details | NyayaShield</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e63946; --gold: #d4af37; }
        body { background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .details-container { padding: 40px 5%; max-width: 900px; margin: auto; min-height: 80vh; }
        .back-btn { display: inline-block; color: var(--gold); text-decoration: none; font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; }
        #content-area { background: #262626; padding: 40px; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .law-content { font-size: 1.1rem; line-height: 1.8; color: #e0e0e0; }
        .law-content b { color: var(--gold); }
        .law-content ul { list-style-type: none; padding: 0; }
        .law-content li { margin-bottom: 20px; padding-left: 35px; position: relative; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .law-content li::before { content: "\f0e7"; font-family: "Font Awesome 5 Free"; font-weight: 900; position: absolute; left: 0; color: var(--gold); }
        .helpline-box { background: rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px dashed var(--gold); }
        .whatsapp-btn { background-color: #25D366; color: white; border: none; padding: 15px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 30px; width: 100%; transition: 0.3s; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: #111;">
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">Nyaya<span style="color: var(--primary);">Shield</span></div>
        <a href="index.html" style="text-decoration: none; color: white; background: var(--primary); padding: 10px 20px; border-radius: 5px;"><i class="fas fa-home"></i> Home</a>
    </nav>

    <div class="details-container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Go Back</a>
        <div id="content-area">
            <h1 id="main-title" style="color: var(--gold); margin-top: 0;">Legal Information</h1>
            <hr>
            <div id="main-content" class="law-content"></div>
            <button class="whatsapp-btn" onclick="shareToWhatsApp()"><i class="fab fa-whatsapp"></i> Share on WhatsApp</button>
        </div>
    </div>

    <script>
        const legalData = {
            public: {
                title: "Public Recording Rights",
                content: `
                    <li><b>Art 19(1)(a):</b> The Constitution of India grants the freedom to record videos in public spaces.</li>
                    <li><b>On-Duty Officer:</b> You can record government officials on duty if they are acting unlawfully.</li>
                    <li><b>Electronic Evidence:</b> These recordings are admissible as evidence in court under <b>BSA Section 63</b>.</li>
                    <li><b>No Obstruction:</b> Ensure you do not obstruct official work while recording, to avoid <b>BNS Sec 221</b>.</li>
                    <div class="helpline-box"><b>Help:</b> If someone tries to seize your phone, dial <b>112</b>.</div>`
            },
            couple: {
                title: "Rights for Couples",
                content: `
                    <li><b>Right to Move:</b> Adults (18+) have the right to move freely with consent (Art 21).</li>
                    <li><b>Moral Policing:</b> Police or public cannot arrest you for sitting in parks (BNS Sec 115).</li>
                    <li><b>Privacy:</b> Police have no legal right to check your phone or demand parents' contact numbers.</li>
                    <li><b>Safety:</b> In case of harassment, file an FIR under <b>BNS Sec 74/78</b> (Stalking/Harassment).</li>
                    <div class="helpline-box"><b>Help:</b> Call 1091 (Women) or 112 for assistance.</div>`
            },
            tenant: {
                title: "Tenant Rights",
                content: `
                    <li><b>Privacy:</b> Landlords cannot enter your premises without prior permission.</li>
                    <li><b>Utilities:</b> Cutting off water or electricity even for non-payment of rent is illegal (Rent Control Act).</li>
                    <li><b>Eviction:</b> You cannot be evicted without a formal notice period (minimum 1 month).</li>
                    <li><b>Harassment:</b> If a landlord forcefully removes your belongings, file a complaint under <b>BNS Sec 324</b>.</li>
                    <div class="helpline-box"><b>Help:</b> Contact Local Police or the Rent Control Authority.</div>`
            },
            delivery: {
                title: "Delivery Partner Rights",
                content: `
                    <li><b>Dignity:</b> Customers cannot use abusive language; this is a punishable offense under <b>BNS Sec 352</b>.</li>
                    <li><b>Physical Assault:</b> In case of physical assault, file an FIR immediately under <b>BNS Sec 115</b>.</li>
                    <li><b>Entry Rights:</b> Society guards cannot legally prohibit you from using elevators.</li>
                    <li><b>Safe Working:</b> Platforms are responsible for your insurance and workplace safety.</li>
                    <div class="helpline-box"><b>Help:</b> Use app support and dial 112 for emergencies.</div>`
            },
            police_misconduct: {
                title: "Police Misconduct Rights",
                content: `
                    <li><b>Right to Know:</b> You have the right to know the grounds of your arrest (BNSS Sec 35).</li>
                    <li><b>Assault:</b> Physical assault in police custody is a crime under <b>BNS Sec 118</b>.</li>
                    <li><b>Legal Aid:</b> You have the right to consult a lawyer immediately upon detention (BNSS Sec 41).</li>
                    <li><b>Complaint:</b> If an FIR is refused, write to the SSP or Magistrate (BNSS Sec 175).</li>
                    <div class="helpline-box"><b>Help:</b> Dial 1064 (Anti-Corruption Helpline).</div>`
            },
            mens_rights: {
                title: "Men's Legal Rights",
                content: `
                    <li><b>False Cases:</b> Use chats and recordings as evidence in false 498A cases under <b>BSA Sec 63</b>.</li>
                    <li><b>Bail:</b> In case of a false FIR, you can seek a stay from the High Court under <b>BNSS Sec 482</b>.</li>
                    <li><b>Maintenance:</b> If the spouse is earning, present salary proofs in court to contest maintenance.</li>
                    <li><b>Equality:</b> Men have the right to file complaints in cases of domestic violence.</li>
                    <div class="helpline-box"><b>Help:</b> Connect with support groups like Save Indian Family (SIF).</div>`
            },
            zero_fir: {
                title: "Zero FIR Rights",
                content: `
                    <li><b>Any Station:</b> An FIR can be filed at any police station, regardless of where the crime occurred (BNSS Sec 173).</li>
                    <li><b>Transfer:</b> The police must register the FIR and transfer it to the relevant jurisdiction.</li>
                    <li><b>No Refusal:</b> It is illegal for police to refuse an FIR citing "jurisdiction" issues.</li>
                    <li><b>Free Copy:</b> You are legally entitled to a free copy of the registered FIR.</li>
                    <div class="helpline-box"><b>Help:</b> Dial 112 to request a Zero FIR registration.</div>`
            },
            id_fraud: {
                title: "Identity Fraud (BNS Sec 69)",
                content: `
                    <li><b>False Promises:</b> Establishing relations based on a false promise of marriage is a crime under <b>BNS Sec 69</b>.</li>
                    <li><b>Identity:</b> Concealing your true identity to deceive someone carries up to 10 years of imprisonment.</li>
                    <li><b>Consent:</b> Consent obtained through deceit is not considered "Free Consent" under the law.</li>
                    <li><b>Evidence:</b> Chat logs and audio clips serve as crucial evidence in these cases.</li>
                    <div class="helpline-box"><b>Help:</b> Consult a legal expert immediately for guidance.</div>`
            },
            car: {
                title: "Car Driver Rights",
                content: `
                    <li><b>Keys:</b> Traffic police cannot legally remove the keys from your vehicle (MV Act).</li>
                    <li><b>Digilocker:</b> Digital documents shown via government apps are valid and cannot be rejected.</li>
                    <li><b>Fine:</b> Only an officer of Sub-Inspector rank or above can issue an on-the-spot fine.</li>
                    <li><b>Women:</b> Women cannot be arrested after sunset without the presence of a lady constable.</li>
                    <div class="helpline-box"><b>Help:</b> Call Traffic Helpline 103 for assistance.</div>`
            },
            bikers: {
                title: "Biker & Superbiker Rights",
                content: `
                    <li><b>Helmet Camera:</b> Using a GoPro on a helmet is legal as long as the helmet's integrity is maintained.</li>
                    <li><b>Challan:</b> Fines cannot be issued for company-fitted exhausts or legal accessories.</li>
                    <li><b>Harassment:</b> Profiling superbikers without cause is harassment; record the interaction.</li>
                    <li><b>Documents:</b> You have the right to present Insurance and PUC in digital formats.</li>
                    <div class="helpline-box"><b>Help:</b> Tag the local Traffic Police on Twitter (X) for quick responses.</div>`
            },
            railways: {
                title: "Railway Passenger Rights",
                content: `
                    <li><b>MRP:</b> Pantry services cannot charge a single paisa over the MRP (Consumer Protection Act).</li>
                    <li><b>Seat Security:</b> A TTE cannot reassign your confirmed seat to another passenger without cause.</li>
                    <li><b>Medical:</b> You can request emergency medical assistance from the Train Guard.</li>
                    <li><b>Overcrowding:</b> Take action via TTE if unreserved passengers enter reserved coaches.</li>
                    <div class="helpline-box"><b>Help:</b> Dial 139 or use the RailMadad app for complaints.</div>`
            },
            women: {
                title: "Women Legal Safety",
                content: `
                    <li><b>Arrest Rule:</b> Women cannot be arrested between 6 PM and 6 AM (BNSS Sec 43).</li>
                    <li><b>Right to Privacy:</b> Protecting the identity of a victim is mandatory by law (BNS Sec 72).</li>
                    <li><b>Maternity:</b> Maternity leave is a legal right for working professionals.</li>
                    <li><b>Complaint:</b> Take action against misconduct or harassment under <b>BNS Sec 79</b>.</li>
                    <div class="helpline-box"><b>Help:</b> Dial 1091 (Women Power Line) for immediate help.</div>`
            },
            consumer: {
                title: "Consumer Protection (MRP)",
                content: `
                    <li><b>No Extra Charge:</b> Retailers or restaurants cannot charge above the MRP.</li>
                    <li><b>Right to Bill:</b> Refusing to provide a bill is a violation of the Consumer Protection Act.</li>
                    <li><b>Expiry:</b> Selling products past their expiry date is a serious legal offense.</li>
                    <li><b>Refund:</b> You have the right to a refund or replacement for defective products.</li>
                    <div class="helpline-box"><b>Help:</b> Call the National Consumer Helpline at 1915.</div>`
            },
            phone: {
                title: "Phone Privacy Rights",
                content: `
                    <li><b>Unlock:</b> Police cannot legally force you to unlock your phone without a warrant.</li>
                    <li><b>Search Warrant:</b> A specific legal warrant is required to search your digital devices.</li>
                    <li><b>Privileged Info:</b> Communications between Lawyer and Client are confidential (BSA Sec 129).</li>
                    <li><b>Data Protection:</b> Leaking or copying data without consent is a Cyber Crime.</li>
                    <div class="helpline-box"><b>Help:</b> Report issues to the Cyber Cell (1930).</div>`
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get('id');

        if (legalData[catId]) {
            document.getElementById('main-title').innerText = legalData[catId].title;
            document.getElementById('main-content').innerHTML = `<ul>${legalData[catId].content}</ul>`;
        } else {
            document.getElementById('main-title').innerText = "Data Not Found";
            document.getElementById('main-content').innerHTML = "<p>We apologize, information for this category will be updated soon.</p>";
        }

        function shareToWhatsApp() {
            const title = document.getElementById('main-title').innerText;
            const content = document.getElementById('main-content').innerText;
            const message = `*NyayaShield Legal Info*%0A%0A*${title}*%0A%0A${content}`;
            window.open(`https://api.whatsapp.com/send?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
