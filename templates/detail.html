<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Details | NyayaShield</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e63946; --gold: #d4af37; }
        body { background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .details-container { padding: 40px 5%; max-width: 900px; margin: auto; min-height: 80vh; }
        .back-btn { display: inline-block; color: var(--gold); text-decoration: none; font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; }
        #content-area { background: #262626; padding: 40px; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .law-content { font-size: 1.1rem; line-height: 1.8; color: #e0e0e0; }
        .law-content b { color: var(--gold); }
        .law-content ul { list-style-type: none; padding: 0; }
        .law-content li { margin-bottom: 20px; padding-left: 35px; position: relative; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .law-content li::before { content: "\f0e7"; font-family: "Font Awesome 5 Free"; font-weight: 900; position: absolute; left: 0; color: var(--gold); }
        .helpline-box { background: rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px dashed var(--gold); }
        .whatsapp-btn { background-color: #25D366; color: white; border: none; padding: 15px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 30px; width: 100%; transition: 0.3s; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: #111;">
        <div class="logo" style="font-size: 1.5rem; font-weight: bold;">Nyaya<span style="color: var(--primary);">Shield</span></div>
        <a href="index.html" style="text-decoration: none; color: white; background: var(--primary); padding: 10px 20px; border-radius: 5px;"><i class="fas fa-home"></i> Home</a>
    </nav>

    <div class="details-container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Wapas Jayein</a>
        <div id="content-area">
            <h1 id="main-title" style="color: var(--gold); margin-top: 0;">Kanooni Jaankari</h1>
            <hr>
            <div id="main-content" class="law-content"></div>
            <button class="whatsapp-btn" onclick="shareToWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp par Jankari Bhejein</button>
        </div>
    </div>

    <script>
        const legalData = {
            public: {
                title: "Public Recording Rights",
                content: `
                    <li><b>Art 19(1)(a):</b> Bharat ka samvidhan aapko public place par video banane ki azadi deta hai.</li>
                    <li><b>On-Duty Officer:</b> Aap kisi bhi sarkari officer ki duty ke waqt recording kar sakte hain agar wo galat kar raha ho.</li>
                    <li><b>Electronic Evidence:</b> Ye video <b>BSA Section 63</b> ke tehat court mein saboot mana jayega.</li>
                    <li><b>No Obstruction:</b> Recording karte waqt kaam mein rukawat na dalein, varna <b>BNS Sec 221</b> lag sakta hai.</li>
                    <div class="helpline-box"><b>Help:</b> Agar koi phone cheene, toh <b>112</b> dial karein.</div>`
            },
            couple: {
                title: "Rights for Couples",
                content: `
                    <li><b>Right to Move:</b> 18 saal se upar ke ladka-ladki marzi se ghum sakte hain (Art 21).</li>
                    <li><b>Moral Policing:</b> Police ya public aapko park mein baithne par arrest nahi kar sakti (BNS Sec 115).</li>
                    <li><b>Privacy:</b> Police ko aapke phone check karne ya parents ka number mangne ka koi haq nahi hai.</li>
                    <li><b>Safety:</b> Agar koi tang kare, toh <b>BNS Sec 74/78</b> (Stalking/Harassment) ke tehat FIR karein.</li>
                    <div class="helpline-box"><b>Help:</b> 1091 (Women) ya 112 par call karein.</div>`
            },
            tenant: {
                title: "Tenant (Kirayedar) Rights",
                content: `
                    <li><b>Privacy:</b> Makan maalik bina permission ke aapke kamre mein nahi aa sakta.</li>
                    <li><b>Utilities:</b> Rent na dene par bhi bijli-paani kaatna illegal hai (Rent Control Act).</li>
                    <li><b>Eviction:</b> Bina 1 mahine ke notice ke aapko ghar se nahi nikala ja sakta.</li>
                    <li><b>Harassment:</b> Saman bahar fenkne par <b>BNS Sec 324</b> ke tehat complaint karein.</li>
                    <div class="helpline-box"><b>Help:</b> Local Police Station ya Rent Authority jayein.</div>`
            },
            delivery: {
                title: "Delivery Partner Rights",
                content: `
                    <li><b>Dignity:</b> Customer aapko gaali nahi de sakta, ye <b>BNS Sec 352</b> ke tehat apradh hai.</li>
                    <li><b>Physical Assault:</b> Maar-peet hone par turant <b>BNS Sec 115</b> ke tehat FIR darj karwayein.</li>
                    <li><b>Entry Rights:</b> Society guards aapko lift use karne se mana nahi kar sakte.</li>
                    <li><b>Safe Working:</b> Company aapki insurance aur safety ke liye zimmedar hai.</li>
                    <div class="helpline-box"><b>Help:</b> App support aur 112 dono use karein.</div>`
            },
            police_misconduct: {
                title: "Police Misconduct Rights",
                content: `
                    <li><b>Right to Know:</b> Arrest ka karan janna aapka adhikar hai (BNSS Sec 35).</li>
                    <li><b>Assault:</b> Police custody mein maar-peet <b>BNS Sec 118</b> ke tehat jurm hai.</li>
                    <li><b>Legal Aid:</b> Aapko apne lawyer se baat karne ka turant haq hai (BNSS Sec 41).</li>
                    <li><b>Complaint:</b> Police FIR na likhe toh SSP ya Magistrate ko likhein (BNSS Sec 175).</li>
                    <div class="helpline-box"><b>Help:</b> 1064 (Anti-Corruption) par call karein.</div>`
            },
            mens_rights: {
                title: "Men's Legal Rights",
                content: `
                    <li><b>False Cases:</b> Jhoote 498A case mein chats aur recordings ko <b>BSA Sec 63</b> mein use karein.</li>
                    <li><b>Bail:</b> Jhooti FIR hone par <b>BNSS Sec 482</b> ke tehat High Court se stay le sakte hain.</li>
                    <li><b>Maintenance:</b> Agar biwi kama rahi hai, toh court mein salary proof pesh karein.</li>
                    <li><b>Equality:</b> Domestic violence hone par police ko complaint dene ka aapko bhi haq hai.</li>
                    <div class="helpline-box"><b>Help:</b> Save Indian Family (SIF) jaise groups se judein.</div>`
            },
            zero_fir: {
                title: "Zero FIR Rights",
                content: `
                    <li><b>Any Station:</b> Crime kahin bhi hua ho, FIR kisi bhi police station mein ho sakti hai (BNSS Sec 173).</li>
                    <li><b>Transfer:</b> Police ko FIR darj karke use sahi thane mein transfer karna hoga.</li>
                    <li><b>No Refusal:</b> "Jurisdiction" ke naam par FIR mana karna police ke liye illegal hai.</li>
                    <li><b>Free Copy:</b> FIR darj hone ke baad free copy lena aapka kanooni haq hai.</li>
                    <div class="helpline-box"><b>Help:</b> 112 par call karke Zero FIR ki request karein.</div>`
            },
            id_fraud: {
                title: "Identity Fraud (BNS Sec 69)",
                content: `
                    <li><b>False Promises:</b> Shaadi ka jhoota wada karke relation banana <b>BNS Sec 69</b> mein jurm hai.</li>
                    <li><b>Identity:</b> Apni pehchan chhupa kar kisi ke sath dhokha karna 10 saal tak ki saja hai.</li>
                    <li><b>Consent:</b> Dhokhe se li gayi consent "Free Consent" nahi maani jati.</li>
                    <li><b>Evidence:</b> Aise mamlo mein chats aur audio clips bahut bada saboot hote hain.</li>
                    <div class="helpline-box"><b>Help:</b> Turant kisi expert lawyer se salah lein.</div>`
            },
            car: {
                title: "Car Driver Rights",
                content: `
                    <li><b>Keys:</b> Traffic police aapki car ki chabi nahi nikal sakti (MV Act).</li>
                    <li><b>Digilocker:</b> Digital documents dikhane par koi challan nahi hoga.</li>
                    <li><b>Fine:</b> On-the-spot fine ke liye officer ka Sub-Inspector rank hona zaroori hai.</li>
                    <li><b>Women:</b> Suraj dhalne ke baad mahila driver ko lady constable ke bina arrest nahi kar sakte.</li>
                    <div class="helpline-box"><b>Help:</b> Traffic Helpline 103 par call karein.</div>`
            },
            bikers: {
                title: "Biker & Superbiker Rights",
                content: `
                    <li><b>Helmet Camera:</b> Helmet par GoPro lagana illegal nahi hai (jab tak helmet structure safe ho).</li>
                    <li><b>Challan:</b> Company fitted exhaust ya accessories par challan nahi ho sakta.</li>
                    <li><b>Harassment:</b> "Superbike" dekh kar bina wajah rokna harassment hai, video banayein.</li>
                    <li><b>Documents:</b> Insurance aur PUC digital dikhane ka pura haq hai.</li>
                    <div class="helpline-box"><b>Help:</b> Twitter par local Traffic Police ko tag karein.</div>`
            },
            railways: {
                title: "Railway Passenger Rights",
                content: `
                    <li><b>MRP:</b> Pantry car MRP se ek paisa bhi zyada nahi le sakti (Consumer Act).</li>
                    <li><b>Seat Security:</b> TTE bina wajah kisi ki seat kisi aur ko nahi de sakta.</li>
                    <li><b>Medical:</b> Train mein tabiyat kharab hone par Guard se medical help mang sakte hain.</li>
                    <li><b>Overcrowding:</b> Unreserved passengers agar reserved coach mein aayein toh TTE par action lein.</li>
                    <div class="helpline-box"><b>Help:</b> 139 dial karein ya RailMadad use karein.</div>`
            },
            women: {
                title: "Women Legal Safety",
                content: `
                    <li><b>Arrest Rule:</b> Shaam 6 ke baad aur subah 6 se pehle mahila ki arrest mana hai (BNSS Sec 43).</li>
                    <li><b>Right to Privacy:</b> Rape victim ka naam aur pehchan chhupana anivarya hai (BNS Sec 72).</li>
                    <li><b>Maternity:</b> Workplace par maternity leaves lena aapka kanooni adhikar hai.</li>
                    <li><b>Complaint:</b> Mahilaon ke khilaf badtameezi par <b>BNS Sec 79</b> ke tehat action lein.</li>
                    <div class="helpline-box"><b>Help:</b> 1091 (Women Power Line) dial karein.</div>`
            },
            consumer: {
                title: "Consumer Protection (MRP)",
                content: `
                    <li><b>No Extra Charge:</b> Restaurant ya shop MRP se zyada charge nahi kar sakti.</li>
                    <li><b>Right to Bill:</b> Bill mangne par mana karna <b>Consumer Protection Act</b> ka violation hai.</li>
                    <li><b>Expiry:</b> Expiry date ke baad saman bechna sangeen jurm hai.</li>
                    <li><b>Refund:</b> Defective product par refund ya replacement lena aapka adhikar hai.</li>
                    <div class="helpline-box"><b>Help:</b> National Consumer Helpline 1915 par call karein.</div>`
            },
            phone: {
                title: "Phone Privacy Rights",
                content: `
                    <li><b>Unlock:</b> Police aapko zabardasti phone unlock karne ke liye majboor nahi kar sakti.</li>
                    <li><b>Search Warrant:</b> Phone ki search ke liye legal warrant ya sangeen shak hona zaroori hai.</li>
                    <li><b>Privileged Info:</b> Lawyer aur Client ki baatein koi nahi sun sakta (BSA Sec 129).</li>
                    <li><b>Data Protection:</b> Bina marzi data copy karna ya leak karna Cyber Crime hai.</li>
                    <div class="helpline-box"><b>Help:</b> Cyber Cell (1930) par shikayat karein.</div>`
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get('id');

        if (legalData[catId]) {
            document.getElementById('main-title').innerText = legalData[catId].title;
            document.getElementById('main-content').innerHTML = `<ul>${legalData[catId].content}</ul>`;
        } else {
            document.getElementById('main-title').innerText = "Data Not Found";
            document.getElementById('main-content').innerHTML = "<p>Maafi chahte hain, is category ki jankari jald hi update ki jayegi.</p>";
        }

        function shareToWhatsApp() {
            const title = document.getElementById('main-title').innerText;
            const content = document.getElementById('main-content').innerText;
            const message = `*NyayaShield Legal Info*%0A%0A*${title}*%0A%0A${content}`;
            window.open(`https://api.whatsapp.com/send?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
